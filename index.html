<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E8231A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Portada Digital">
  <meta name="description" content="Portal digital del Hospital Municipal La Portada">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <title>La Portada Digital</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rojo:    #E8231A;
      --rojo-dk: #B51A13;
      --verde:   #1A9E75;
      --azul:    #1565C0;
      --gris:    #F4F4F4;
      --borde:   #E0E0E0;
      --texto:   #1A1A1A;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: #fff;
      color: var(--texto);
      overflow: hidden;
    }

    /* ── LAYOUT PRINCIPAL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── CABECERA ── */
    header {
      background: var(--rojo);
      padding: 10px 14px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    header img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .header-text {
      display: flex;
      flex-direction: column;
    }

    .header-text .titulo {
      color: white;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }

    .header-text .subtitulo {
      color: rgba(255,255,255,0.82);
      font-size: 11px;
      font-weight: 600;
      margin-top: 1px;
    }

    /* ── PESTAÑAS ── */
    nav {
      display: flex;
      flex-shrink: 0;
      border-bottom: 2px solid var(--borde);
      background: #fff;
    }

    .tab-btn {
      flex: 1;
      padding: 0;
      border: none;
      background: #f9f9f9;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 9px 4px 7px;
      gap: 2px;
      border-bottom: 3px solid transparent;
      transition: background 0.18s, border-color 0.18s;
      position: relative;
    }

    .tab-btn:first-child {
      border-right: 1px solid var(--borde);
    }

    /* Farmacheck → verde */
    .tab-btn[data-tab="farma"].active {
      background: #fff;
      border-bottom-color: var(--verde);
    }
    .tab-btn[data-tab="farma"].active .tab-label {
      color: var(--verde);
    }
    .tab-btn[data-tab="farma"].active .tab-sub {
      color: var(--verde);
      opacity: 0.8;
    }
    .tab-btn[data-tab="farma"] .tab-icon {
      color: var(--verde);
    }

    /* Cartera → azul */
    .tab-btn[data-tab="cartera"].active {
      background: #fff;
      border-bottom-color: var(--azul);
    }
    .tab-btn[data-tab="cartera"].active .tab-label {
      color: var(--azul);
    }
    .tab-btn[data-tab="cartera"].active .tab-sub {
      color: var(--azul);
      opacity: 0.8;
    }
    .tab-btn[data-tab="cartera"] .tab-icon {
      color: var(--azul);
    }

    .tab-icon {
      font-size: 20px;
      line-height: 1;
    }

    .tab-label {
      font-size: 12px;
      font-weight: 800;
      color: #888;
      letter-spacing: 0.2px;
      line-height: 1.1;
    }

    .tab-sub {
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.1px;
      line-height: 1.1;
    }

    .tab-btn.active .tab-label,
    .tab-btn.active .tab-sub {
      /* colores aplicados por data-tab selectores */
    }

    /* ── PANELES / IFRAMES ── */
    .panels {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: none;
    }

    .panel.active {
      display: block;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── PANTALLA DE CARGA ── */
    .loading-screen {
      position: absolute;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      transition: opacity 0.4s;
    }

    .loading-screen.oculto {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #eee;
      border-top-color: var(--rojo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen p {
      font-size: 13px;
      color: #999;
      font-weight: 600;
    }

    /* ── PIE ── */
    footer {
      flex-shrink: 0;
      padding: 5px 14px;
      padding-bottom: max(5px, env(safe-area-inset-bottom));
      background: #fafafa;
      border-top: 1px solid var(--borde);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 10px;
      color: #bbb;
      font-weight: 600;
    }

    .dot-online {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--verde);
      display: inline-block;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- CABECERA -->
  <header>
    <img src="icons/icon-192x192.png" alt="La Portada Digital">
    <div class="header-text">
      <span class="titulo">Hospital Municipal La Portada</span>
      <span class="subtitulo">Creado por: Marcelo Oviedo L.</span>
    </div>
  </header>

  <!-- PESTAÑAS -->
  <nav>
    <button class="tab-btn active" data-tab="farma" onclick="switchTab('farma', this)">
      <span class="tab-icon">💊</span>
      <span class="tab-label">FarmaCheck</span>
      <span class="tab-sub">Stock y Restricciones</span>
    </button>
    <button class="tab-btn" data-tab="cartera" onclick="switchTab('cartera', this)">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Cartera de Servicios</span>
      <span class="tab-sub">Diagnósticos y Códigos</span>
    </button>
  </nav>

  <!-- PANELES -->
  <div class="panels">

    <div id="panel-farma" class="panel active">
      <div class="loading-screen" id="loading-farma">
        <div class="spinner"></div>
        <p>Cargando FarmaCheck…</p>
      </div>
      <iframe
        src="https://marceoviedo1980.github.io/FarmaCheck/"
        title="FarmaCheck – Stock y Restricciones"
        loading="lazy"
        onload="hideLoading('loading-farma')"
      ></iframe>
    </div>

    <div id="panel-cartera" class="panel">
      <div class="loading-screen" id="loading-cartera">
        <div class="spinner"></div>
        <p>Cargando Cartera de Servicios…</p>
      </div>
      <iframe
        src="https://marceoviedo1980.github.io/cartera-servicios/"
        title="Cartera de Servicios – Diagnósticos y Códigos"
        loading="lazy"
        onload="hideLoading('loading-cartera')"
      ></iframe>
    </div>

  </div>

  <!-- PIE -->
  <footer>
    <span>La Portada Digital · 2026</span>
    <span><span class="dot-online"></span>En línea</span>
  </footer>

</div>

<script>
  // ── Cambio de pestaña ──
  function switchTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
  }

  // ── Ocultar pantalla de carga ──
  function hideLoading(id) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('oculto');
      setTimeout(() => el.remove(), 450);
    }
  }

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.warn);
  }

  // ── Estado online/offline ──
  const dot = document.querySelector('.dot-online');
  const footerRight = dot?.parentElement;
  function updateOnline() {
    if (!dot || !footerRight) return;
    if (navigator.onLine) {
      dot.style.background = '#1A9E75';
      footerRight.lastChild.textContent = 'En línea';
    } else {
      dot.style.background = '#E8231A';
      footerRight.lastChild.textContent = 'Sin conexión';
    }
  }
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);
</script>

</body>
</html>
